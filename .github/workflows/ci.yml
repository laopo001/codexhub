name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protocol-and-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate app-server protocol
        run: pnpm run check:app-server-protocol

      - name: Check source and unit contracts
        run: pnpm check

      - name: Run core smokes
        run: pnpm run smoke:core
